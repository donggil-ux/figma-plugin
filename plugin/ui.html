<!DOCTYPE html>
<html>
<head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F3F4F5;
      color: #110F1A;
      display: flex;
      flex-direction: column;
    }

    /* 탭 스타일 */
    .tabs-container {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #F3F4F5;
      border-bottom: 1px solid #D7D8E5;
      flex-shrink: 0;
    }

    .tabs {
      display: flex;
      background: transparent;
      position: relative;
      overflow-x: scroll;
      overflow-y: hidden;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding: 0 20px;
      gap: 24px;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      flex: 0 0 auto;
      height: 42px;
      padding: 0 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 16px;
      font-weight: 500;
      color: #838499;
      background: transparent;
      border: none;
      cursor: grab;
      position: relative;
      white-space: nowrap;
      user-select: none;
    }

    .tab.active {
      color: #110F1A;
      font-weight: 600;
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: #110F1A;
      border-radius: 2px;
    }

    /* 콘텐츠 영역 스크롤 컨테이너 */
    .content-wrapper {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-top: 20px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* 타이틀 섹션 */
    .title-section {
      padding: 28px 20px 12px 20px;
    }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: #110F1A;
    }

    /* 메인 컨텐츠 */
    .main-content {
      padding: 0 20px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* 카드 */
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 28px 24px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #110F1A;
    }

    /* 네이밍 아이템 리스트 */
    .naming-list {
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
    }

    .naming-item {
      display: flex;
      align-items: center;
      height: 60px;
      cursor: pointer;
    }

    .naming-item .icon {
      width: 24px;
      height: 24px;
      margin-right: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .naming-item .icon svg {
      width: 24px;
      height: 24px;
    }

    .naming-item .label {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
      color: #110F1A;
    }

    .naming-item .radio {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #D7D8E5;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #D7D8E5;
    }

    .naming-item .radio::after {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
    }

    .naming-item .radio.active {
      border-color: #FF424D;
      background: #FF424D;
    }

    /* 버튼 그룹 */
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .button-group.horizontal {
      flex-direction: row;
      gap: 8px;
    }

    .button-group.horizontal .btn {
      flex: 1;
    }

    .btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 16px;
    }

    .btn-primary {
      background: #120E33;
      color: #fff;
    }

    .btn-primary:hover {
      background: #1a1545;
    }

    .btn-secondary {
      background: #fff;
      color: #110F1A;
      border: 1px solid #D7D8E5;
    }

    .btn-secondary:hover {
      background: #F9FAFB;
    }

    /* 상태 메시지 */
    .status {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    .status.show {
      display: block;
    }

    .status.success {
      background: #ECFDF5;
      color: #059669;
    }

    .status.error {
      background: #FEF2F2;
      color: #DC2626;
    }

    .status.info {
      background: #EFF6FF;
      color: #2563EB;
    }

    /* Bridge 탭 스타일 */
    .input-group {
      margin-bottom: 16px;
    }

    .input-label {
      font-size: 13px;
      font-weight: 500;
      color: #5A5A73;
      margin-bottom: 8px;
      display: block;
    }

    textarea {
      width: 100%;
      padding: 16px;
      border: 1px solid #D7D8E5;
      border-radius: 12px;
      font-size: 14px;
      resize: none;
      height: 100px;
      font-family: inherit;
      background: #fff;
    }

    textarea:focus {
      outline: none;
      border-color: #110F1A;
    }

    .examples-section {
      margin-top: 20px;
    }

    .examples-title {
      font-size: 12px;
      font-weight: 600;
      color: #9CA3AF;
      margin-bottom: 8px;
    }

    .example-item {
      font-size: 13px;
      color: #5A5A73;
      padding: 12px 16px;
      background: #F3F4F5;
      border-radius: 12px;
      margin-bottom: 6px;
      cursor: pointer;
    }

    .example-item:hover {
      background: #E5E7EB;
    }

    /* 맞춤법 검사 결과 */
    .spell-results {
      margin-top: 10px;
      display: none;
    }

    .spell-results.show {
      display: block;
    }

    .spell-item {
      background: #FFFBEB;
      border: 1px solid #FCD34D;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .spell-item .original {
      color: #DC2626;
      text-decoration: line-through;
    }

    .spell-item .correct {
      color: #059669;
      font-weight: 600;
    }

    .spell-item .fix-btn {
      background: #120E33;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 10px 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }

    .spell-ok {
      background: #ECFDF5;
      color: #059669;
      padding: 16px;
      border-radius: 12px;
      font-size: 13px;
    }

    /* 리사이즈 핸들 */
    .resize-handle {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 16px;
      height: 16px;
      cursor: nwse-resize;
      z-index: 9999;
    }

    .resize-handle::before {
      content: '';
      position: absolute;
      bottom: 3px;
      right: 3px;
      width: 8px;
      height: 8px;
      border-right: 2px solid #C7CAD9;
      border-bottom: 2px solid #C7CAD9;
    }

    /* Data Fill 스타일 */
    .category-tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .category-tab {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid #D7D8E5;
      background: #fff;
      font-size: 13px;
      font-weight: 500;
      color: #5A5A73;
      cursor: pointer;
      transition: all 0.2s;
    }

    .category-tab:hover {
      border-color: #110F1A;
    }

    .category-tab.active {
      background: #110F1A;
      border-color: #110F1A;
      color: #fff;
    }

    .field-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 280px;
      overflow-y: auto;
    }

    .field-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: #F9FAFB;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .field-item:hover {
      background: #F3F4F5;
    }

    .field-item.selected {
      background: #EEF2FF;
      border: 1px solid #6366F1;
    }

    .field-item .field-name {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      color: #110F1A;
    }

    .field-item .field-desc {
      font-size: 12px;
      color: #838499;
      margin-right: 8px;
    }

    .field-item .field-check {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 2px solid #D7D8E5;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .field-item.selected .field-check {
      background: #6366F1;
      border-color: #6366F1;
    }

    .field-item.selected .field-check::after {
      content: '✓';
      color: #fff;
      font-size: 12px;
      font-weight: 700;
    }

    .data-preview {
      margin-top: 16px;
      padding: 12px 16px;
      background: #F9FAFB;
      border-radius: 12px;
      font-size: 12px;
      color: #5A5A73;
    }

    .data-preview-title {
      font-weight: 600;
      color: #110F1A;
      margin-bottom: 4px;
    }

    .data-preview-value {
      font-family: 'SF Mono', Monaco, monospace;
      color: #6366F1;
    }

    /* Checker 탭 스타일 */
    .checker-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }

    .checker-tab {
      flex: 1;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #D7D8E5;
      background: #fff;
      font-size: 12px;
      font-weight: 600;
      color: #5A5A73;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .checker-tab:hover {
      border-color: #110F1A;
    }

    .checker-tab.active {
      background: #110F1A;
      border-color: #110F1A;
      color: #fff;
    }

    .checker-summary {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .summary-card {
      flex: 1;
      padding: 16px;
      background: #F9FAFB;
      border-radius: 12px;
      text-align: center;
    }

    .summary-card.error {
      background: #FEF2F2;
    }

    .summary-card.success {
      background: #ECFDF5;
    }

    .summary-number {
      font-size: 24px;
      font-weight: 700;
      color: #110F1A;
    }

    .summary-card.error .summary-number {
      color: #DC2626;
    }

    .summary-card.success .summary-number {
      color: #059669;
    }

    .summary-label {
      font-size: 11px;
      color: #838499;
      margin-top: 4px;
    }

    .checker-results {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 300px;
      overflow-y: auto;
    }

    .checker-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .checker-item:hover {
      background: #FEE2E2;
    }

    .checker-item.warning {
      background: #FFFBEB;
      border-color: #FCD34D;
    }

    .checker-item.warning:hover {
      background: #FEF3C7;
    }

    .checker-item-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .checker-item-icon svg {
      width: 16px;
      height: 16px;
    }

    .checker-item-info {
      flex: 1;
      min-width: 0;
    }

    .checker-item-name {
      font-size: 13px;
      font-weight: 600;
      color: #110F1A;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .checker-item-detail {
      font-size: 11px;
      color: #838499;
      margin-top: 2px;
    }

    .checker-item-badge {
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      background: #DC2626;
      color: #fff;
      flex-shrink: 0;
    }

    .checker-item.warning .checker-item-badge {
      background: #D97706;
    }

    .checker-empty {
      padding: 40px 20px;
      text-align: center;
      color: #838499;
    }

    .checker-empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .checker-empty-text {
      font-size: 14px;
      font-weight: 500;
    }

    .checker-empty-subtext {
      font-size: 12px;
      margin-top: 4px;
    }

    .checker-loading {
      padding: 40px 20px;
      text-align: center;
      color: #838499;
    }

    .checker-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #E5E7EB;
      border-top-color: #110F1A;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Compare 탭 스타일 */
    .compare-input-section {
      margin-bottom: 16px;
    }

    .compare-textarea {
      width: 100%;
      height: 120px;
      padding: 12px;
      border: 1px solid #D7D8E5;
      border-radius: 12px;
      font-size: 13px;
      font-family: inherit;
      resize: none;
      background: #fff;
    }

    .compare-textarea:focus {
      outline: none;
      border-color: #110F1A;
    }

    .compare-source-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .compare-source-tab {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #D7D8E5;
      background: #fff;
      font-size: 12px;
      font-weight: 600;
      color: #5A5A73;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .compare-source-tab:hover {
      border-color: #110F1A;
    }

    .compare-source-tab.active {
      background: #110F1A;
      border-color: #110F1A;
      color: #fff;
    }

    .compare-results {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 280px;
      overflow-y: auto;
    }

    .compare-item {
      display: flex;
      align-items: flex-start;
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .compare-item.match {
      background: #ECFDF5;
      border: 1px solid #A7F3D0;
    }

    .compare-item.mismatch {
      background: #FEF2F2;
      border: 1px solid #FECACA;
    }

    .compare-item.missing {
      background: #FFFBEB;
      border: 1px solid #FCD34D;
    }

    .compare-item:hover {
      opacity: 0.9;
    }

    .compare-item-icon {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      flex-shrink: 0;
      font-size: 14px;
    }

    .compare-item.match .compare-item-icon {
      background: #D1FAE5;
    }

    .compare-item.mismatch .compare-item-icon {
      background: #FEE2E2;
    }

    .compare-item.missing .compare-item-icon {
      background: #FEF3C7;
    }

    .compare-item-content {
      flex: 1;
      min-width: 0;
    }

    .compare-item-label {
      font-size: 11px;
      font-weight: 600;
      color: #838499;
      margin-bottom: 4px;
    }

    .compare-item-text {
      font-size: 13px;
      color: #110F1A;
      word-break: break-word;
    }

    .compare-item-diff {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px dashed #E5E7EB;
    }

    .compare-item-expected {
      font-size: 12px;
      color: #059669;
    }

    .compare-item-actual {
      font-size: 12px;
      color: #DC2626;
      margin-top: 2px;
    }

    .compare-summary-bar {
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      background: #F9FAFB;
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .compare-stat {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .compare-stat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .compare-stat-dot.match { background: #059669; }
    .compare-stat-dot.mismatch { background: #DC2626; }
    .compare-stat-dot.missing { background: #D97706; }

    .notion-url-input {
      width: 100%;
      padding: 12px;
      border: 1px solid #D7D8E5;
      border-radius: 12px;
      font-size: 13px;
      background: #fff;
      margin-bottom: 8px;
    }

    .notion-url-input:focus {
      outline: none;
      border-color: #110F1A;
    }


    /* Code2Design 탭 스타일 */
    .code-input-section { margin-bottom: 16px; }
    .file-upload-area {
      border: 1.5px dashed #D7D8E5; border-radius: 10px;
      padding: 12px 16px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 10px;
      background: #F8F8FC; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .file-upload-area:hover, .file-upload-area.drag-over {
      border-color: #6366F1; background: #F0F0FF;
    }
    .file-upload-area input[type="file"] { display: none; }
    .file-upload-icon { font-size: 18px; flex-shrink: 0; }
    .file-upload-text { font-size: 12px; color: #6B6B6B; flex: 1; }
    .file-upload-text strong { color: #6366F1; }
    .file-upload-name { font-size: 11px; color: #6366F1; font-weight: 600; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .code-textarea {
      width: 100%; height: 320px; padding: 12px;
      border: 1px solid #D7D8E5; border-radius: 12px;
      font-size: 12px; font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      resize: none; background: #1E1E1E; color: #D4D4D4; line-height: 1.5;
      box-sizing: border-box;
    }
    .code-textarea:focus { outline: none; border-color: #6366F1; }
    .code-textarea::placeholder { color: #6B6B6B; }
    .code-preview { margin-top: 12px; padding: 12px; background: #F8F8FC; border-radius: 10px; }
    .code-preview-title { font-size: 11px; font-weight: 600; color: #838499; margin-bottom: 6px; }
    .code-preview-info { font-size: 12px; color: #110F1A; }

    /* ===== Snackbar ===== */
    #snackbar {
      position: fixed;
      top: -70px;
      left: 12px;
      right: 12px;
      z-index: 10000;
      background: #110F1A;
      color: #fff;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: top 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      pointer-events: none;
    }
    #snackbar.show { top: 8px; }
    #snackbar.success { background: #059669; }
    #snackbar.error { background: #DC2626; }
    #snackbar.info { background: #2563EB; }
    #snackbar .snackbar-icon { font-size: 15px; flex-shrink: 0; }

    /* ===== Button loading state ===== */
    .btn .btn-text { display: flex; align-items: center; gap: 6px; }
    .btn .btn-loading { display: none; align-items: center; gap: 8px; }
    .btn.loading .btn-text { display: none; }
    .btn.loading .btn-loading { display: flex; }
    .btn.loading { pointer-events: none; opacity: 0.75; }
    .btn-spinner {
      width: 15px;
      height: 15px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    .btn-secondary .btn-spinner {
      border-color: rgba(17,15,26,0.2);
      border-top-color: #110F1A;
    }

  </style>
</head>
<body>
  <!-- 스낵바 -->
  <div id="snackbar"><span class="snackbar-icon"></span><span id="snackbarMsg"></span></div>

  <!-- 리사이즈 핸들 -->
  <div class="resize-handle" id="resizeHandle"></div>

  <!-- 탭 헤더 -->
  <div class="tabs-container">
    <div class="tabs" id="tabsScroller">

  <script>
    // ===== HTML 이스케이프 (XSS 방지) =====
    function escapeHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ===== Snackbar & Button loading utilities =====
    let snackbarTimer = null;
    function showSnackbar(message, type) {
      const el = document.getElementById('snackbar');
      const icon = el.querySelector('.snackbar-icon');
      const msg = document.getElementById('snackbarMsg');
      const icons = { success: '✅', error: '❌', info: 'ℹ️' };
      el.className = 'show ' + (type || 'info');
      icon.textContent = icons[type] || 'ℹ️';
      msg.textContent = message;
      clearTimeout(snackbarTimer);
      snackbarTimer = setTimeout(() => { el.className = type || 'info'; }, 3000);
    }

    function setButtonLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      if (loading) btn.classList.add('loading');
      else btn.classList.remove('loading');
    }

    // 로딩 중인 버튼 추적 (메시지 타입 → 버튼 ID)
    const loadingBtnMap = {};

    function startLoading(btnId, statusKey) {
      loadingBtnMap[statusKey] = btnId;
      setButtonLoading(btnId, true);
    }

    function stopLoading(statusKey) {
      const btnId = loadingBtnMap[statusKey];
      if (btnId) { setButtonLoading(btnId, false); delete loadingBtnMap[statusKey]; }
    }

    // ===== 탭 드래그 스크롤 =====
    const tabsScroller = document.getElementById('tabsScroller');
    let isTabDragging = false;
    let tabStartX;
    let tabScrollLeft;

    tabsScroller.addEventListener('mousedown', (e) => {
      isTabDragging = true;
      tabsScroller.style.cursor = 'grabbing';
      tabStartX = e.pageX - tabsScroller.offsetLeft;
      tabScrollLeft = tabsScroller.scrollLeft;
    });

    tabsScroller.addEventListener('mouseleave', () => {
      isTabDragging = false;
      tabsScroller.style.cursor = 'grab';
    });

    tabsScroller.addEventListener('mouseup', () => {
      isTabDragging = false;
      tabsScroller.style.cursor = 'grab';
    });

    tabsScroller.addEventListener('mousemove', (e) => {
      if (!isTabDragging) return;
      e.preventDefault();
      const x = e.pageX - tabsScroller.offsetLeft;
      const walk = (x - tabStartX) * 1.5;
      tabsScroller.scrollLeft = tabScrollLeft - walk;
    });

    // 탭 전환
    document.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = (e) => {
        // 드래그 중이면 클릭 무시
        if (Math.abs(e.pageX - tabsScroller.offsetLeft - tabStartX) > 5) return;

        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-tab').classList.add('active');
      };
    });

    // ===== Rename 탭 =====
    let selectedNaming = 'Content';
    const renameStatus = document.getElementById('renameStatus');

    document.querySelectorAll('.naming-item').forEach(item => {
      item.onclick = () => {
        document.querySelectorAll('.naming-item .radio').forEach(r => r.classList.remove('active'));
        item.querySelector('.radio').classList.add('active');
        selectedNaming = item.dataset.value;
      };
    });

    function showRenameStatus(message, type) {
      renameStatus.textContent = message;
      renameStatus.className = 'status show ' + type;
    }

    document.getElementById('selectedChangeBtn').onclick = () => {
      startLoading('selectedChangeBtn', 'rename-status');
      parent.postMessage({
        pluginMessage: { type: 'rename-selected', namingType: selectedNaming }
      }, '*');
    };

    document.getElementById('autoRenameBtn').onclick = () => {
      startLoading('autoRenameBtn', 'rename-status');
      parent.postMessage({ pluginMessage: { type: 'auto-rename' } }, '*');
    };

    // ===== Bridge 탭 =====
    const commandInput = document.getElementById('command');
    const directTextInput = document.getElementById('directText');
    const bridgeStatus = document.getElementById('bridgeStatus');
    const spellResults = document.getElementById('spellResults');

    function showBridgeStatus(message, type) {
      bridgeStatus.textContent = message;
      bridgeStatus.className = 'status show ' + type;
    }

    // 직접 텍스트 변경 버튼
    document.getElementById('directChangeBtn').onclick = () => {
      const newText = directTextInput.value;
      if (!newText) {
        showSnackbar('변경할 텍스트를 입력해주세요', 'error');
        return;
      }
      startLoading('directChangeBtn', 'bridge-status');
      parent.postMessage({
        pluginMessage: { type: 'direct-text-change', text: newText }
      }, '*');
    };

    document.getElementById('executeBtn').onclick = () => {
      const command = commandInput.value.trim();
      if (!command) {
        showSnackbar('명령어를 입력해주세요', 'error');
        return;
      }
      startLoading('executeBtn', 'bridge-status');
      parent.postMessage({ pluginMessage: { type: 'execute-command', command } }, '*');
    };

    document.getElementById('spellCheckBtn').onclick = () => {
      startLoading('spellCheckBtn', 'spell-results');
      spellResults.className = 'spell-results';
      spellResults.innerHTML = '';
      parent.postMessage({ pluginMessage: { type: 'spell-check' } }, '*');
    };

    document.querySelectorAll('.example-item').forEach(el => {
      el.onclick = () => { commandInput.value = el.dataset.cmd; };
    });

    // ===== 메시지 수신 =====
    let selectionCount = 0;  // 현재 Figma에서 선택된 레이어 개수
    let matchingLayerCount = 0;  // 선택된 필드명과 일치하는 레이어 개수

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'status') {
        showBridgeStatus(msg.message, msg.status);
        if (msg.status === 'success' || msg.status === 'error') {
          stopLoading('bridge-status');
          showSnackbar(msg.message, msg.status);
        }
      }
      if (msg.type === 'rename-status') {
        showRenameStatus(msg.message, msg.status);
        if (msg.status === 'success' || msg.status === 'error') {
          stopLoading('rename-status');
          showSnackbar(msg.message, msg.status);
        }
      }
      if (msg.type === 'data-fill-status') {
        showDataFillStatus(msg.message, msg.status);
        if (msg.status === 'success' || msg.status === 'error') {
          stopLoading('data-fill-status');
          showSnackbar(msg.message, msg.status);
        }
      }

      // Figma 선택 변경 시 미리보기 업데이트
      if (msg.type === 'selection-update') {
        selectionCount = msg.count;
        matchingLayerCount = msg.matchingCount || 0;
        updatePreview();
      }

      if (msg.type === 'spell-results') {
        stopLoading('spell-results');
        bridgeStatus.className = 'status';
        spellResults.className = 'spell-results show';

        if (msg.errors.length === 0) {
          showSnackbar('맞춤법 오류가 없습니다!', 'success');
          spellResults.innerHTML = '<div class="spell-ok">맞춤법 오류가 없습니다!</div>';
        } else {
          showSnackbar(`맞춤법 오류 ${msg.errors.length}개 발견`, 'error');
          spellResults.innerHTML = msg.errors.map((err, idx) => `
            <div class="spell-item">
              <div><span class="original">${escapeHtml(err.original)}</span> → <span class="correct">${escapeHtml(err.correct)}</span></div>
              <div style="color:#5A5A73;margin-top:6px;font-size:12px;">${escapeHtml(err.help || '')}</div>
              <button class="fix-btn" data-idx="${idx}">수정하기</button>
            </div>
          `).join('');

          spellResults.querySelectorAll('.fix-btn').forEach(btn => {
            btn.onclick = () => {
              const idx = parseInt(btn.dataset.idx);
              const err = msg.errors[idx];
              parent.postMessage({
                pluginMessage: { type: 'execute-command', command: `${err.original}>${err.correct}` }
              }, '*');
            };
          });
        }
      }

      if (msg.type === 'check-spelling') checkSpelling(msg.texts);

      // Code2Design 관련 메시지
      if (msg.type === 'code2design-status') {
        showCode2DesignStatus(msg.message, msg.status);
        if (msg.status === 'success' || msg.status === 'error') {
          const btn = document.getElementById('generateDesignBtn');
          if (btn) btn.classList.remove('loading');
          showSnackbar(msg.message, msg.status);
        }
      }

      // code.js에서 이미지 fetch 요청 → UI 스레드에서 처리 후 데이터 반환
      if (msg.type === 'generate-avatars-batch') {
        try {
          const results = (msg.nodeIds || []).map(nodeId => {
            let data = null;
            try { data = generateAvatarBytes(); } catch(e) { console.error('[Avatar] generateAvatarBytes failed:', e); }
            return { nodeId, data };
          });
          parent.postMessage({ pluginMessage: { type: 'avatars-batch-result', results } }, '*');
        } catch(e) {
          console.error('[Avatar] batch handler crashed:', e);
          parent.postMessage({ pluginMessage: { type: 'avatars-batch-result', results: [] } }, '*');
        }
      }

      if (msg.type === 'fetch-image') {
        fetch(msg.url)
          .then(r => {
            if (!r.ok) throw new Error(`HTTP ${r.status} ${r.statusText}`);
            return r.arrayBuffer();
          })
          .then(buffer => {
            parent.postMessage({
              pluginMessage: {
                type: 'image-fetch-result',
                nodeId: msg.nodeId,
                data: Array.from(new Uint8Array(buffer))
              }
            }, '*');
          })
          .catch(e => {
            console.error('[Avatar] fetch FAILED:', msg.url, '|', e.message || e);
            showSnackbar('이미지 로드 실패: ' + (e.message || 'network error'), 'error');
            parent.postMessage({
              pluginMessage: { type: 'image-fetch-result', nodeId: msg.nodeId, data: null }
            }, '*');
          });
      }

      // Checker 관련 메시지
      if (msg.type === 'checker-status') {
        showCheckerStatus(msg.message, msg.status);
        if (msg.status === 'error') {
          stopLoading('checker-results');
          showSnackbar(msg.message, 'error');
        }
      }
      if (msg.type === 'checker-results') {
        stopLoading('checker-results');
        checkerResults[msg.checkerType] = msg.results;
        checkerScanned[msg.checkerType] = true;
        renderCheckerResults();
        const errorCount = msg.results.filter(r => !r.isApplied).length;
        const statusMsg = `스캔 완료: ${errorCount}개 미적용 발견`;
        showCheckerStatus(statusMsg, errorCount > 0 ? 'error' : 'success');
        showSnackbar(statusMsg, errorCount > 0 ? 'error' : 'success');
      }

      // Compare 관련 메시지
      if (msg.type === 'compare-status') showCompareStatus(msg.message, msg.status);
      if (msg.type === 'compare-results') {
        renderCompareResults(msg.results);
        const mismatchCount = msg.results.filter(r => r.status === 'mismatch').length;
        const missingCount = msg.results.filter(r => r.status === 'missing').length;
        if (mismatchCount + missingCount === 0) {
          showCompareStatus('모든 내용이 일치합니다! 🎉', 'success');
        } else {
          showCompareStatus(`${mismatchCount}개 불일치, ${missingCount}개 누락 발견`, 'error');
        }
      }
    };

    async function checkSpelling(texts) {
      const errors = [];
      for (const text of texts) {
        try {
          const response = await fetch('https://m.search.naver.com/p/csearch/ocontent/util/SpellerProxy', {
            method: 'POST',

    // Google Sheets에서 특정 시트 데이터 불러오기
    async function loadSheetData(sheetName) {
      try {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
        const response = await fetch(url);
        const text = await response.text();

        const jsonString = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/);
        if (!jsonString || !jsonString[1]) {
          console.error(`${sheetName} 시트 응답 파싱 실패`);
          return [];
        }

        const json = JSON.parse(jsonString[1]);
        const table = json.table;
        const result = [];

        const headers = table.cols.map(col => col.label || '');
        headers.forEach((header, colIdx) => {
          if (!header) return;

          const values = [];
          table.rows.forEach(row => {
            const cell = row.c[colIdx];
            if (cell && cell.v) {
              values.push(String(cell.v));
            }
          });

          if (values.length > 0) {
            result.push({ name: header, desc: header, values: values });
          }
        });

        return result;
      } catch (error) {
        console.error(`${sheetName} 시트 로드 실패:`, error);
        return [];
      }
    }

      const matchCount = results.filter(r => r.status === 'match').length;
      const mismatchCount = results.filter(r => r.status === 'mismatch').length;
      const missingCount = results.filter(r => r.status === 'missing').length;

    let checkerResults = { component: [], variable: [], textstyle: [] };
    let checkerScanned = { component: false, variable: false, textstyle: false };
    const checkerResultsEl = document.getElementById('checkerResults');
    const checkerStatus = document.getElementById('checkerStatus');

    // 체커 탭 전환
    document.querySelectorAll('.checker-tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.checker-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentCheckerType = tab.dataset.checker;
        renderCheckerResults();
      };
    });

    function showCheckerStatus(message, type) {
      checkerStatus.textContent = message;
      checkerStatus.className = 'status show ' + type;
    }

    function updateCheckerSummary(total, errors, success) {
      document.querySelector('#summaryTotal .summary-number').textContent = total;
      document.querySelector('#summaryError .summary-number').textContent = errors;
      document.querySelector('#summarySuccess .summary-number').textContent = success;
    }

    function renderCheckerResults() {
      const results = checkerResults[currentCheckerType] || [];

      if (!checkerScanned[currentCheckerType]) {
        checkerResultsEl.innerHTML = `
          <div class="checker-empty">
            <div class="checker-empty-icon">🔍</div>
            <div class="checker-empty-text">레이어를 선택하고 스캔하세요</div>
            <div class="checker-empty-subtext">선택한 레이어에서 디자인 시스템 적용 여부를 확인합니다</div>
          </div>
        `;
        updateCheckerSummary('-', '-', '-');
        return;
      }

      if (results.length === 0) {
        checkerResultsEl.innerHTML = `
          <div class="checker-empty">
            <div class="checker-empty-icon">✅</div>
            <div class="checker-empty-text">문제가 없습니다!</div>
            <div class="checker-empty-subtext">모든 레이어에 디자인 시스템이 적용되어 있습니다</div>
          </div>
        `;
        updateCheckerSummary('-', '-', '-');
        return;
      }

      // 요약 업데이트
      const total = results.length;
      const errors = results.filter(r => !r.isApplied).length;
      const success = results.filter(r => r.isApplied).length;
      updateCheckerSummary(total, errors, success);

      // 미적용 레이어만 표시
      const errorItems = results.filter(r => !r.isApplied);

      if (errorItems.length === 0) {
        checkerResultsEl.innerHTML = `
          <div class="checker-empty">
            <div class="checker-empty-icon">✅</div>
            <div class="checker-empty-text">모두 적용됨!</div>
            <div class="checker-empty-subtext">선택한 레이어에 모두 디자인 시스템이 적용되어 있습니다</div>
          </div>
        `;
        return;
      }

      checkerResultsEl.innerHTML = errorItems.map(item => `
        <div class="checker-item ${item.severity === 'warning' ? 'warning' : ''}" data-node-id="${escapeHtml(item.nodeId)}">
          <div class="checker-item-icon">
            ${getCheckerIcon(item.type)}
          </div>
          <div class="checker-item-info">
            <div class="checker-item-name">${escapeHtml(item.name)}</div>
            <div class="checker-item-detail">${escapeHtml(item.detail)}</div>
          </div>
          <div class="checker-item-badge">${escapeHtml(item.badge)}</div>
        </div>
      `).join('');

      // 클릭 시 해당 노드 선택
      checkerResultsEl.querySelectorAll('.checker-item').forEach(item => {
        item.onclick = () => {
          const nodeId = item.dataset.nodeId;
          parent.postMessage({
            pluginMessage: { type: 'select-node', nodeId: nodeId }
          }, '*');
        };
      });
    }

    function getCheckerIcon(type) {
      switch(type) {
        case 'component':
          return '<svg viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>';
        case 'variable':
          return '<svg viewBox="0 0 24 24" fill="none" stroke="#D97706" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v8m-4-4h8"/></svg>';
        case 'textstyle':
          return '<svg viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>';
        default:
          return '';
      }
    }

    // 스캔 버튼
    document.getElementById('scanDesignBtn').onclick = () => {
      startLoading('scanDesignBtn', 'checker-results');
      checkerResultsEl.innerHTML = `
        <div class="checker-loading">
          <div class="checker-spinner"></div>
          <div>디자인 시스템 검사 중...</div>
        </div>
      `;
      parent.postMessage({
        pluginMessage: { type: 'scan-design-system', checkerType: currentCheckerType }
      }, '*');
    };

    // 미적용 레이어 모두 선택 버튼
    document.getElementById('selectAllErrorsBtn').onclick = () => {
      const errorItems = checkerResults[currentCheckerType]?.filter(r => !r.isApplied) || [];
      if (errorItems.length === 0) {
        showSnackbar('미적용 레이어가 없습니다', 'info');
        return;
      }
      startLoading('selectAllErrorsBtn', 'select-errors');
      const nodeIds = errorItems.map(item => item.nodeId);
      parent.postMessage({
        pluginMessage: { type: 'select-multiple-nodes', nodeIds: nodeIds }
      }, '*');
      setTimeout(() => {
        stopLoading('select-errors');
        showSnackbar(`${errorItems.length}개 레이어 선택됨`, 'success');
      }, 400);
    };

    // ===== 리사이즈 기능 =====
    const resizeHandle = document.getElementById('resizeHandle');
    let isResizing = false;
    let startX, startY, startWidth, startHeight;

    resizeHandle.addEventListener('mousedown', (e) => {
      isResizing = true;
      startX = e.clientX;
      startY = e.clientY;
      startWidth = window.innerWidth;
      startHeight = window.innerHeight;
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;

      const newWidth = Math.max(300, startWidth + (e.clientX - startX));
      const newHeight = Math.max(400, startHeight + (e.clientY - startY));

      parent.postMessage({
        pluginMessage: { type: 'resize', width: newWidth, height: newHeight }
      }, '*');
    });

    document.addEventListener('mouseup', () => {
      isResizing = false;
    });

    // ===== Code2Design =====
    // ===== Canvas 아바타 생성 (네트워크 불필요) =====
    const AVATAR_COLORS = [
      '#FF6B6B','#FF9F43','#FECA57','#48DBFB','#1DD1A1',
      '#54A0FF','#5F27CD','#FF9FF3','#00D2D3','#576574'
    ];
    let avatarColorIndex = 0;

    function generateAvatarBytes(size) {
      size = size || 200;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');

      // 배경 원 (색상 순환)
      const color = AVATAR_COLORS[avatarColorIndex % AVATAR_COLORS.length];
      avatarColorIndex++;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
      ctx.fill();

      // 사람 실루엣 (흰색)
      ctx.fillStyle = 'rgba(255,255,255,0.88)';
      // 머리
      ctx.beginPath();
      ctx.arc(size / 2, size * 0.36, size * 0.18, 0, Math.PI * 2);
      ctx.fill();
      // 몸통 (반원)
      ctx.beginPath();
      ctx.arc(size / 2, size * 0.92, size * 0.30, Math.PI, 0);
      ctx.fill();

      // PNG → Uint8Array
      const dataURL = canvas.toDataURL('image/png');
      const b64 = dataURL.split(',')[1];
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return Array.from(bytes);
    }

    // ===== HTML 파일 업로드 =====
    (function() {
      function setUploadState(state, label) {
        var area   = document.getElementById('fileUploadArea');
        var iconEl = document.querySelector('#fileUploadArea .file-upload-icon');
        var textEl = document.getElementById('fileUploadText');
        var nameEl = document.getElementById('fileUploadName');
        if (!area) return;
        area.style.borderColor = '';
        if (state === 'loading') {
          if (iconEl) iconEl.textContent = '⏳';
          if (textEl) { textEl.innerHTML = '<strong>파일 읽는 중...</strong>'; textEl.style.display = 'block'; }
          if (nameEl) nameEl.style.display = 'none';
        } else if (state === 'success') {
          if (iconEl) iconEl.textContent = '✅';
          if (nameEl) { nameEl.textContent = label; nameEl.style.display = 'block'; }
          if (textEl) textEl.style.display = 'none';
          area.style.borderColor = '#6366F1';
        } else if (state === 'error') {
          if (iconEl) iconEl.textContent = '❌';
          if (textEl) { textEl.innerHTML = '<strong style="color:#ef4444">' + (label || '파일 읽기 실패') + '</strong>'; textEl.style.display = 'block'; }
          if (nameEl) nameEl.style.display = 'none';
          area.style.borderColor = '#ef4444';
        } else {
          if (iconEl) iconEl.textContent = '📂';
          if (textEl) { textEl.innerHTML = '<strong>파일 선택</strong> 또는 여기에 드래그'; textEl.style.display = 'block'; }
          if (nameEl) nameEl.style.display = 'none';
        }
      }

      function loadFile(file) {
        if (!file) return;
        setUploadState('loading');
        var reader = new FileReader();
        reader.onload = function(e) {
          var textarea = document.getElementById('codeInput');
          if (!textarea) { setUploadState('error', '입력 영역을 찾을 수 없음'); return; }
          textarea.value = e.target.result;
          setUploadState('success', file.name);
        };
        reader.onerror = function() {
          setUploadState('error', '파일을 읽을 수 없습니다');
          showCode2DesignStatus('파일 읽기 실패. 다시 시도해주세요.', 'error');
        };
        reader.readAsText(file, 'UTF-8');
      }

      var input = document.getElementById('htmlFileInput');
      var area  = document.getElementById('fileUploadArea');
      if (input) input.addEventListener('change', function() { if (this.files[0]) loadFile(this.files[0]); });
      if (area) {
        area.addEventListener('dragover',  function(e) { e.preventDefault(); area.classList.add('drag-over'); });
        area.addEventListener('dragleave', function()  { area.classList.remove('drag-over'); });
        area.addEventListener('drop', function(e) {
          e.preventDefault(); area.classList.remove('drag-over');
          var file = e.dataTransfer.files[0];
          if (file) loadFile(file);
        });
      }
    })();

    function showCode2DesignStatus(message, type) {
      const el = document.getElementById('code2designStatus');
      if (el) { el.textContent = message; el.className = 'status show ' + type; }
    }

    function isFullHTMLDocument(code) {
      var t = code.trimStart().toLowerCase();
      return t.startsWith('<!doctype') || t.startsWith('<html');
    }

    function extractCSSAndHTML(code) {
      var css = '', html = code, links = '';
      html = code.replace(/<style[^>]*>([\s\S]*?)<\/style>/gi, function(m, c) { css += c + '\n'; return ''; });
      // Preserve <link rel="stylesheet"> (Google Fonts, icon fonts, etc.)
      // Handles both <link ... > and <link ... /> (self-closing)
      html = html.replace(/<link([^>]*)\/?>/gi, function(m, attrs) {
        if (/rel=["']?stylesheet["']?/i.test(attrs)) { links += m + '\n'; }
        return '';
      });
      html = html.replace(/<\/?(?:html|head|body|!DOCTYPE)[^>]*>/gi, '').trim();
      html = html.replace(/<(?:meta|title)[^>]*>/gi, '');
      return { css: css.trim(), html: html.trim(), links: links.trim() };
    }

    var C2D_READY_SCRIPT = '<script>window.addEventListener("load",function(){setTimeout(function(){parent.postMessage({c2dReady:true},"*");},300);});<\/script>';

    function buildSrcdocHTML(code) {
      var reset = '<style>*,*::before,*::after{animation-duration:0.001ms!important;transition-duration:0.001ms!important;}</style>';
      if (isFullHTMLDocument(code)) {
        var base = code;
        if (base.indexOf('</head>') >= 0) {
          base = base.replace('</head>', reset + C2D_READY_SCRIPT + '</head>');
        } else {
          base = base.replace(/<body/i, reset + C2D_READY_SCRIPT + '<body') || base;
        }
        return base;
      }
      var p = extractCSSAndHTML(code);
      return '<!DOCTYPE html><html><head><meta charset="utf-8">' + p.links +
        '<style>*{margin:0;padding:0;box-sizing:border-box;}</style>' + reset +
        '<style>' + p.css + '</style>' + C2D_READY_SCRIPT + '</head><body>' + p.html + '</body></html>';
    }

    function buildSrcdocTailwind(code) {
      if (isFullHTMLDocument(code)) {
        var base = code.indexOf('cdn.tailwindcss.com') < 0
          ? code.replace(/<head([^>]*)>/i, '<head$1><script src="https://cdn.tailwindcss.com"><\/script>')
          : code;
        if (base.indexOf('</head>') >= 0) {
          base = base.replace('</head>', C2D_READY_SCRIPT + '</head>');
        } else {
          base = base.replace('</body>', C2D_READY_SCRIPT + '</body>');
        }
        return base;
      }
      var p = extractCSSAndHTML(code);
      return '<!DOCTYPE html><html><head><meta charset="utf-8">' + p.links +
        '<script src="https://cdn.tailwindcss.com"><\/script><style>' + p.css + '</style>' +
        C2D_READY_SCRIPT + '</head><body>' + p.html + '</body></html>';
    }

    function rgbStringToHex(str) {
      if (!str) return '#000000';
      var m = str.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
      if (!m) return '#000000';
      return '#' + [parseInt(m[1]),parseInt(m[2]),parseInt(m[3])].map(c => c.toString(16).padStart(2,'0')).join('');
    }

    function parseRgbAlpha(str) {
      var m = str && str.match(/rgba\([^,]+,[^,]+,[^,]+,\s*([\d.]+)\)/);
      return m ? parseFloat(m[1]) : 1;
    }

    function c2dParseBorderRadius(style) {
      var tl=parseFloat(style.borderTopLeftRadius)||0, tr=parseFloat(style.borderTopRightRadius)||0,
          br=parseFloat(style.borderBottomRightRadius)||0, bl=parseFloat(style.borderBottomLeftRadius)||0;
      if (tl===tr&&tr===br&&br===bl) return tl>0?tl:0;
      return [tl,tr,br,bl];
    }

    function c2dParseBorder(style) {
      var w = parseFloat(style.borderTopWidth);
      if (!w||w===0) return null;
      return { color: rgbStringToHex(style.borderTopColor), width: w };
    }

    function c2dParseBoxShadow(str) {
      if (!str||str==='none') return null;
      var shadows=[], parts=str.split(/,(?![^(]*\))/);
      for (var i=0;i<parts.length;i++) {
        var part=parts[i].trim();
        if (part.indexOf('inset')>=0) continue;
        var m=part.match(/([-\d.]+)px\s+([-\d.]+)px\s+([-\d.]+)px\s*(?:([-\d.]+)px)?\s*(.*)/);
        if (m) shadows.push({offsetX:parseFloat(m[1]),offsetY:parseFloat(m[2]),blur:parseFloat(m[3]),spread:parseFloat(m[4])||0,color:m[5].trim()});
      }
      return shadows.length>0?shadows:null;
    }

    function c2dMapFontWeight(w) {
      var n=parseInt(w); if(isNaN(n)) return 'Regular';
      if(n<=300) return 'Light'; if(n<=400) return 'Regular'; if(n<=500) return 'Medium';
      if(n<=600) return 'Semi Bold'; if(n<=700) return 'Bold'; if(n<=800) return 'Extra Bold';
      return 'Black';
    }

    function c2dMapTextAlign(v) {
      return ({left:'LEFT',center:'CENTER',right:'RIGHT',justify:'JUSTIFIED',start:'LEFT',end:'RIGHT'})[v]||'LEFT';
    }

    function isTextElement(el) {
      if (el.children.length>0) return false;
      var t=el.innerText||el.textContent;
      return t&&t.trim().length>0;
    }

    function traverseDOM(el, win, depth) {
      if ((depth||0)>20) return null;
      var tag=el.tagName;
      if (!tag) return null;
      var tagUpper=tag.toUpperCase();
      if (['SCRIPT','STYLE','LINK','META','BR','NOSCRIPT','TEMPLATE'].indexOf(tagUpper)>=0) return null;
      var style=win.getComputedStyle(el);
      if (style.display==='none'||style.visibility==='hidden') return null;
      var rect=el.getBoundingClientRect();
      var w=rect.width||el.offsetWidth||0, h=rect.height||el.offsetHeight||0;
      if (w===0&&h===0) return null;
      var node={};

      // SVG: render as a solid placeholder rectangle (skip complex SVG internals)
      if (tagUpper==='SVG'||el.namespaceURI==='http://www.w3.org/2000/svg') {
        node.type='frame'; node.name='svg-icon';
        node.width=Math.round(w); node.height=Math.round(h);
        var svgColor=style.fill&&style.fill!=='none'?rgbStringToHex(style.fill):rgbStringToHex(style.color);
        node.fill=svgColor||'#6B7280'; node.cornerRadius=2; node.children=[];
        return node;
      }

      // Leaf frame elements: must be checked BEFORE isTextElement,
      // otherwise <button>Text</button> would be misclassified as a text node.
      if (['INPUT','TEXTAREA','SELECT','BUTTON','CANVAS'].indexOf(tagUpper)>=0) {
        node.type='frame';
        node.name=tagUpper.toLowerCase()+(el.id?'#'+el.id:'');
        node.width=Math.round(w); node.height=Math.round(h);
        var bg2=style.backgroundColor;
        if (bg2&&bg2!=='rgba(0, 0, 0, 0)'&&bg2!=='transparent') { node.fill=rgbStringToHex(bg2); }
        var cr2=c2dParseBorderRadius(style); if(cr2) node.cornerRadius=cr2;
        var border2=c2dParseBorder(style); if(border2){node.strokeColor=border2.color;node.strokeWeight=border2.width;}
        node.layoutMode='NONE'; node.children=[];
        // INPUT/TEXTAREA: use value/placeholder; BUTTON/SELECT: use visible innerText
        var valText=(tagUpper==='INPUT'||tagUpper==='TEXTAREA')
          ? (el.value||el.placeholder||'')
          : (el.innerText||el.textContent||'').trim();
        if (valText.trim()) {
          node.children.push({type:'text',name:'label',content:valText.trim(),
            fontSize:parseFloat(style.fontSize)||14,
            fontFamily:(style.fontFamily||'Inter').split(',')[0].replace(/['"]/g,'').trim(),
            fontWeight:c2dMapFontWeight(style.fontWeight),color:rgbStringToHex(style.color)});
        }
        return node;
      }

      if (isTextElement(el)) {
        node.type='text'; node.name=tagUpper.toLowerCase();
        node.content=(el.innerText||el.textContent||'').trim();
        node.width=Math.round(w); node.height=Math.round(h);
        node.fontSize=parseFloat(style.fontSize)||14;
        node.fontFamily=(style.fontFamily||'Inter').split(',')[0].replace(/['"]/g,'').trim();
        node.fontWeight=c2dMapFontWeight(style.fontWeight);
        node.color=rgbStringToHex(style.color);
        var ls=parseFloat(style.letterSpacing); if(ls&&!isNaN(ls)) node.letterSpacing=ls;
        var lh=parseFloat(style.lineHeight); if(lh&&!isNaN(lh)) node.lineHeight=lh;
        node.textAlign=c2dMapTextAlign(style.textAlign);
        return node;
      }

      node.type='frame';
      node.name=tagUpper.toLowerCase()+(el.id?'#'+el.id:'')+(el.className&&typeof el.className==='string'&&el.className.trim()?'.'+el.className.trim().split(/\s+/)[0]:'');
      node.width=Math.round(w); node.height=Math.round(h);
      var bg=style.backgroundColor;
      if (bg&&bg!=='rgba(0, 0, 0, 0)'&&bg!=='transparent') { node.fill=rgbStringToHex(bg); var a=parseRgbAlpha(bg); if(a<1) node.fillOpacity=a; }
      // background-image (gradient or image): mark type, keep solid fill as fallback
      var bgImg=style.backgroundImage;
      if (bgImg&&bgImg!=='none') {
        if (bgImg.indexOf('gradient')>=0) { node.fillGradient=bgImg; node.fill=node.fill||'#E2E8F0'; }
        else { node.fill=node.fill||'#E5E7EB'; node.isImageFill=true; }
      }
      var cr=c2dParseBorderRadius(style); if(cr) node.cornerRadius=cr;
      var border=c2dParseBorder(style); if(border){node.strokeColor=border.color;node.strokeWeight=border.width;}
      var shadow=c2dParseBoxShadow(style.boxShadow); if(shadow) node.shadows=shadow;
      node.clipsContent=(style.overflow==='hidden'||style.overflowX==='hidden'||style.overflowY==='hidden');
      var op=parseFloat(style.opacity); if(op<1) node.opacity=op;

      var display=style.display;
      if (display==='flex'||display==='inline-flex') {
        node.layoutMode=(style.flexDirection==='column'||style.flexDirection==='column-reverse')?'VERTICAL':'HORIZONTAL';
        node.justifyContent=style.justifyContent; node.alignItems=style.alignItems;
        node.gap=parseFloat(style.gap)||parseFloat(style.columnGap)||0;
        node.padding=[parseFloat(style.paddingTop)||0,parseFloat(style.paddingRight)||0,parseFloat(style.paddingBottom)||0,parseFloat(style.paddingLeft)||0];
      } else {
        // CSS grid and all other layouts: use absolute positioning (NONE)
        node.layoutMode='NONE';
        node.padding=[parseFloat(style.paddingTop)||0,parseFloat(style.paddingRight)||0,parseFloat(style.paddingBottom)||0,parseFloat(style.paddingLeft)||0];
      }

      if (tagUpper==='IMG') { node.name='img'+(el.alt?'.'+el.alt.substring(0,20):''); node.fill='#E5E7EB'; node.isImageFill=true; node.children=[]; return node; }

      node.children=[];
      for (var i=0;i<el.children.length;i++) {
        var childNode=traverseDOM(el.children[i],win,(depth||0)+1);
        if (childNode) {
          if (node.layoutMode==='NONE') {
            var childRect=el.children[i].getBoundingClientRect();
            childNode.x=Math.round(childRect.left-rect.left); childNode.y=Math.round(childRect.top-rect.top);
          } else {
            var childStyle=win.getComputedStyle(el.children[i]);
            var childPos=childStyle.position;
            // Absolutely positioned children inside flex: give them coords
            if (childPos==='absolute'||childPos==='fixed') {
              var childRect2=el.children[i].getBoundingClientRect();
              childNode.x=Math.round(childRect2.left-rect.left); childNode.y=Math.round(childRect2.top-rect.top);
              childNode.positionAbsolute=true;
            } else {
              var flexGrow=parseFloat(childStyle.flexGrow)||0;
              if (flexGrow>0) { if(node.layoutMode==='HORIZONTAL') childNode.widthFill=true; else childNode.heightFill=true; }
            }
          }
          node.children.push(childNode);
        }
      }
      for (var j=0;j<el.childNodes.length;j++) {
        var cn=el.childNodes[j];
        if (cn.nodeType===3&&cn.textContent.trim()) {
          node.children.push({type:'text',name:'text',content:cn.textContent.trim(),
            fontSize:parseFloat(style.fontSize)||14,
            fontFamily:(style.fontFamily||'Inter').split(',')[0].replace(/['"]/g,'').trim(),
            fontWeight:c2dMapFontWeight(style.fontWeight),color:rgbStringToHex(style.color)});
        }
      }
      return node;
    }

    function countNodesJSON(tree) {
      var count=0;
      function walk(arr){if(!arr)return;for(var i=0;i<arr.length;i++){count++;if(arr[i].children)walk(arr[i].children);}}
      walk(tree.elements); return count;
    }

    function stripCodeFences(code) {
      // Remove markdown code fences: ```html, ```css, ```json, ```jsx, ```tsx, ```js, ```ts, etc.
      return code.replace(/^```(?:html|css|json|jsx?|tsx?|vue|svelte|markup|xml|javascript|typescript)?\s*\n?/i, '').replace(/\n?```\s*$/,'').trim();
    }

    function detectCodeType(code) {
      var t=code.trim();
      if (t.charAt(0)==='{') { try{JSON.parse(t);return 'json';}catch(e){} }
      // Figma plugin script: uses figma.* APIs directly
      if (/figma\.(createFrame|createText|createEllipse|createRectangle|currentPage|loadFontAsync|createComponent|createInstance|notify)\s*[\(\[]/.test(t)) return 'figma-script';
      if (t.indexOf('cdn.tailwindcss.com')>=0) return 'tailwind';
      return 'html';
    }

    var _c2dGenId = 0; // generation counter to prevent stale timeout race conditions

    function generateDesign() {
      var btn=document.getElementById('generateDesignBtn');
      var code=(document.getElementById('codeInput')||{}).value;
      if (!code||!code.trim()) { showCode2DesignStatus('코드를 입력해주세요','error'); return; }
      // Strip markdown code fences that Claude often wraps code in
      code=stripCodeFences(code.trim());
      var codeType=detectCodeType(code);
      var genId = ++_c2dGenId; // unique ID for this generation call

      if (codeType==='json') {
        try {
          var geminiResult=JSON.parse(code);
          if(btn) btn.classList.add('loading');
          showCode2DesignStatus('Figma 프레임 생성 중...','info');
          parent.postMessage({pluginMessage:{type:'generate-from-tailwind',geminiResult:geminiResult}},'*');
          return;
        } catch(e) {}
      }

      if (codeType==='figma-script') {
        if(btn) btn.classList.add('loading');
        showCode2DesignStatus('Figma 스크립트 실행 중...','info');
        parent.postMessage({pluginMessage:{type:'execute-figma-script',code:code}},'*');
        return;
      }

      if(btn) btn.classList.add('loading');
      showCode2DesignStatus('렌더링 중...','info');

      try {
        var srcdoc=(codeType==='tailwind')?buildSrcdocTailwind(code):buildSrcdocHTML(code);
        var iframe=document.getElementById('renderFrame');
        var renderTimeout=setTimeout(function(){
          if (genId !== _c2dGenId) return; // stale: a newer generation superseded this one
          window.removeEventListener('message', c2dReadyHandler);
          if(btn) btn.classList.remove('loading');
          showCode2DesignStatus('렌더링 시간 초과. 코드를 확인해주세요.','error');
        },15000);

        function captureDesign() {
          if (genId !== _c2dGenId) return; // stale: a newer generation superseded this one
          clearTimeout(renderTimeout);
          window.removeEventListener('message', c2dReadyHandler);
          try {
            showCode2DesignStatus('스타일 추출 중...','info');
            var doc=iframe.contentDocument||iframe.contentWindow.document;
            var body=doc.body, docEl=doc.documentElement, win=iframe.contentWindow;
            var bgColor=rgbStringToHex(win.getComputedStyle(body).backgroundColor);
            var docWidth=Math.max(docEl.scrollWidth,body.scrollWidth,1440);
            var docHeight=Math.max(docEl.scrollHeight,body.scrollHeight,100);
            var designTree={
              name:'Code2Design', width:docWidth, height:docHeight,
              backgroundColor:(bgColor==='#000000'&&win.getComputedStyle(body).backgroundColor==='rgba(0, 0, 0, 0)')?'#FFFFFF':bgColor,
              elements:[]
            };
            for (var i=0;i<body.children.length;i++) {
              var nodeJSON=traverseDOM(body.children[i],win,0);
              if (nodeJSON) {
                var childRect=body.children[i].getBoundingClientRect();
                nodeJSON.x=Math.round(childRect.left); nodeJSON.y=Math.round(childRect.top);
                designTree.elements.push(nodeJSON);
              }
            }
            if (designTree.elements.length===0) {
              showCode2DesignStatus('렌더링된 요소가 없습니다. HTML 코드를 확인해주세요.','error');
              if(btn) btn.classList.remove('loading'); return;
            }
            var nodeCount=countNodesJSON(designTree);
            var preview=document.getElementById('codePreview'), previewInfo=document.getElementById('codePreviewInfo');
            if(preview) preview.style.display='block';
            if(previewInfo) previewInfo.innerHTML='<div>추출된 요소: '+nodeCount+'개</div>';
            showCode2DesignStatus('Figma 프레임 생성 중... ('+nodeCount+'개 요소)','info');
            parent.postMessage({pluginMessage:{type:'generate-from-browser-render',designTree:designTree}},'*');
          } catch(e) {
            if(btn) btn.classList.remove('loading');
            showCode2DesignStatus('스타일 추출 실패: '+e.message,'error');
          }
        }

        // Tailwind: CDN 완전 로드 후 캡처 (window.onload 메시지 대기)
        var c2dReadyHandler = function(e) {
          if (e.data && e.data.c2dReady && e.source === iframe.contentWindow) {
            captureDesign();
          }
        };

        iframe.onload=function(){
          // Always wait for c2dReady (window.onload signal injected in all srcdoc types)
          // This correctly handles Google Fonts, external stylesheets, and Tailwind CDN
          window.addEventListener('message', c2dReadyHandler);
        };

        iframe.onerror=function(){
          clearTimeout(renderTimeout);
          window.removeEventListener('message', c2dReadyHandler);
          if(btn) btn.classList.remove('loading');
          showCode2DesignStatus('렌더링 실패','error');
        };

        iframe.srcdoc=srcdoc;
      } catch(e) {
        if(btn) btn.classList.remove('loading');
        showCode2DesignStatus('처리 실패: '+e.message,'error');
      }
    }

  </script>

  <!-- Code2Design: 숨겨진 렌더링 iframe -->
  <iframe id="renderFrame" style="position:absolute;left:-9999px;top:-9999px;width:1440px;height:900px;border:none;visibility:hidden;" sandbox="allow-scripts allow-same-origin"></iframe>

</body>
</html>
